services:
  bitaxe-stabiliser-g1:
    build:
      context: .
    environment:
      - BITAXE_IP=${BITAXE_IP_1}
      # - BITAXE_HOSTNAME=${BITAXE_HOSTNAME:-}
      # - PORT=${PORT:-3000}
      # - HISTORY_LIMIT=${HISTORY_LIMIT:-172800}
      # - TARGET_ASIC=${TARGET_ASIC:-65}
      # - MAX_VR=${MAX_VR:-80}
      # - CORE_VOLTAGE=${CORE_VOLTAGE:-1150}
      # - MAX_FREQ=${MAX_FREQ:-525.0}
      # - STEP_DOWN_DEFAULT=${STEP_DOWN_DEFAULT:- -10}
    ports:
      - "${PORT_1:-3001}:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bitaxe-stabiliser-g2:
    build:
      context: .
    environment:
      - BITAXE_IP=${BITAXE_IP_2}
    ports:
      - "${PORT_2:-3002}:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
