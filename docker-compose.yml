version: '3.8'

services:
  bitaxe-stabiliser:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - BITAXE_IP=${BITAXE_IP}
      - BITAXE_HOSTNAME=${BITAXE_HOSTNAME:-}
      - PORT=${PORT:-3000}
      - HISTORY_LIMIT=${HISTORY_LIMIT:-172800}
      - TARGET_ASIC=${TARGET_ASIC:-65}
      - MAX_VR=${MAX_VR:-80}
      - CORE_VOLTAGE=${CORE_VOLTAGE:-1150}
      - MAX_FREQ=${MAX_FREQ:-525.0}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
